name: daily-signals-forex

on:
  schedule:
    # Primary: ~after ET close (DST-safe via freshness gate).
    - cron: "30 23 * * 1-5"
    # Backstop: ~2h later (next UTC day = same ET evening).
    - cron: "30 1 * * 2-6"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run full backfill (first time or after long outage)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: cache
          key: forex-cache-${{ github.run_id }}
          restore-keys: |
            forex-cache-

      - name: Run pipeline
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python -m src --backfill
          else
            python -m src
          fi

      - name: Upload artifact (debugging)
        uses: actions/upload-artifact@v4
        with:
          name: signals-forex-${{ github.run_id }}
          path: out/
          retention-days: 7

      - name: Freshness gate
        id: gate
        continue-on-error: true
        run: python scripts/check_freshness.py

      - name: Publish to GitHub Pages
        if: steps.gate.outcome == 'success'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages

      - name: Note no-op
        if: steps.gate.outcome != 'success'
        run: echo "Data not finalized yet — no-op, backstop will retry."

      # v1: Mon–Fri cron only. Sunday evening open and Friday close may need
      # separate handling once we validate EODHD bar dates in production.
